version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: projet08-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-projet08}
      - ONNXRUNTIME_PROVIDERS=CPUExecutionProvider
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ml-stack
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: projet08-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-projet08}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-stack
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ml-stack:
    driver: bridge
